name: Bug Report
description: Report something that is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check [existing issues](https://github.com/idlab-discover/aibomgen-cli/issues) to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: AIBoMGen CLI version
      description: Output of `aibomgen-cli --version`
      placeholder: "e.g. 0.2.1"
    validations:
      required: true

  - type: input
    id: go_version
    attributes:
      label: Go version (if built from source)
      placeholder: "e.g. go1.25.0"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04, macOS 15, Windows 11"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command used
      description: The exact command you ran.
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error output or unexpected output.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — target directory structure, HF model ID, log level output, etc.
    validations:
      required: false
