name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          check-latest: true

      - name: Build binary
        run: |
          go build -o AIBoMGen-cli ./
          chmod +x AIBoMGen-cli

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          file: ./AIBoMGen-cli
          format: cyclonedx-json
          output-file: sbom-binary.json
          upload-artifact: false
          upload-release-assets: false

      - name: Scan SBOM for vulnerabilities (Grype)
        uses: anchore/scan-action@v7
        with:
          sbom: sbom-binary.json
          output-format: cyclonedx-json
          output-file: sbom-binary-vulnerabilities.json
          fail-build: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign SBOM (Keyless)
        run: |
          cosign sign-blob --yes \
            --bundle=sbom.bundle.json \
            sbom-binary-vulnerabilities.json

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}