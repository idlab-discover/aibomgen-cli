version: 2

builds:
  - main: .
    binary: aibomgen-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - "-s -w -X main.Version={{ .Version }}"
    flags:
      - "-trimpath"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  extra_files:
    - glob: sbom-binary.json
    - glob: sbom-binary-vulnerabilities.json
    - glob: sbom.bundle.json

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - 'skip ci'